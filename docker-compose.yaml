services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - DB_HOST=database
    ports:
    - "${PORT}:${PORT}"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - analysis-uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  worker-email:
    build: .
    env_file:
      - .env
    environment:
      - DB_HOST=database
    command: ["./worker-email"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  worker-analysis:
    build:
      context: .
      dockerfile: Dockerfile.analysis
    env_file:
      - .env
    environment:
      - DB_HOST=database
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - analysis-databases:/app/databases
      - analysis-uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '${ANALYSIS_CPU:-100}'
          memory: '${ANALYSIS_RAM:-128G}'

  database:
    image: "postgres:15-alpine"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis/redis-stack:7.4.0-v8
    restart: unless-stopped
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

volumes:
  postgres-data:
  analysis-databases:
  analysis-uploads: